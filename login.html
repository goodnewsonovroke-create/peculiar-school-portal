<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peculiar School Portal - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="login-container">
        <img src="school-logo.png.jpg" alt="Peculiar High School Logo">
        <h2>STUDENT RESULT PORTAL</h2>
        <p>Check your academic performance securely.</p>

        <input type="text" id="studentName" placeholder="ENTER FULL NAME" required>
        <input type="text" id="studentId" placeholder="ENTER ID (e.g., PS/2026/5191)" required>
        
        <button id="searchBtn" onclick="checkResult()">SEARCH RESULT</button>
        <p id="errorMessage" style="color: red; display: none;"></p>
    </div>
    <button id="searchBtn" onclick="checkResult()">SEARCH RESULT</button>
        <p id="errorMessage" style="color: red; display: none;"></p>
        
        <!-- Add this missing link right here! -->
        <br>
        <a href="dashboard.html" style="text-decoration: underline; color: #4a00e0; font-size: 14px;">Staff Member? Access Portal</a>
    </div>

    <script>

    <script>
        async function checkResult() {
            const name = document.getElementById('studentName').value;
            const id = document.getElementById('studentId').value;
            const errorText = document.getElementById('errorMessage');
            const btn = document.getElementById('searchBtn');

            if (!name || !id) {
                errorText.innerText = "Please fill in all fields.";
                errorText.style.display = "block";
                return;
            }

            btn.innerText = "LOADING...";
            errorText.style.display = "none";

            try {
                // Guaranteed correct Render URL fetch
                const response = await fetch(`/api/check-result?name=${encodeURIComponent(name)}&id=${encodeURIComponent(id)}`);
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('studentData', JSON.stringify(data));
                    window.location.href = 'results.html'; 
                } else {
                    errorText.innerText = data.error || "Student not found.";
                    errorText.style.display = "block";
                }
            } catch (err) {
                console.error("Fetch error:", err);
                errorText.innerText = "Network error. Unable to connect to the portal.";
                errorText.style.display = "block";
            } finally {
                btn.innerText = "SEARCH RESULT";
            }
        }
    </script>
</body>
</html>
