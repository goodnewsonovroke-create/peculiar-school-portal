<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peculiar School Portal - Login</title>
    <link rel="stylesheet" href="styles.css"> 
</head>
<body class="portal-bg"> <div id="studentContainer" class="portal-container translucent-overlay">
        <img src="school-logo.png" alt="Peculiar High School Logo">
        <h2>STUDENT RESULT PORTAL</h2>
        <p>Check your academic performance securely.</p>

        <input type="text" id="studentName" placeholder="ENTER FULL NAME" required>
        <input type="text" id="studentId" placeholder="ENTER ID (e.g., PS/2026/5191)" required>
        
        <button id="searchBtn" onclick="checkResult()">SEARCH RESULT</button>
        <p id="studentError" class="error-text" style="display: none;"></p>
        
        <br>
        <a href="#" onclick="toggleStaffPortal(true)" class="portal-link">Staff Member? Access Portal</a>
    </div>

    <div id="staffContainer" class="portal-container translucent-overlay" style="display: none;">
        <img src="school-logo.png" alt="Peculiar High School Logo">
        <h2 style="margin-top: 5px;">STAFF PORTAL</h2>
        <p style="color: #FFD700; font-size: 14px; margin-top: -10px;">Authorized Personnel Only</p>

        <input type="text" id="staffId" placeholder="Staff ID (e.g., Admin)" required>
        <input type="password" id="staffPassword" placeholder="Password" required>
        
        <button id="staffLoginBtn" onclick="loginStaff()">LOGIN TO DASHBOARD</button>
        <p id="staffError" class="error-text" style="display: none;"></p>
        
        <br>
        <a href="#" onclick="toggleStaffPortal(false)" class="portal-link">Back to Student Search</a>
    </div>

    <script>
        // FUNCTION: Toggle between Student and Staff views
        function toggleStaffPortal(showStaff) {
            const studentBox = document.getElementById('studentContainer');
            const staffBox = document.getElementById('staffContainer');
            const errorTexts = document.querySelectorAll('.error-text');
            
            // Hide all errors
            errorTexts.forEach(t => t.style.display = 'none');

            if (showStaff) {
                studentBox.style.display = 'none';
                staffBox.style.display = 'block';
            } else {
                studentBox.style.display = 'block';
                staffBox.style.display = 'none';
            }
        }

        // --- STUDENT: Check Result Logic (Clean & Working) ---
        async function checkResult() {
            const name = document.getElementById('studentName').value;
            const id = document.getElementById('studentId').value;
            const errorText = document.getElementById('studentError');
            const btn = document.getElementById('searchBtn');

            if (!name || !id) {
                errorText.innerText = "Please fill in all fields.";
                errorText.style.display = "block";
                return;
            }

            btn.innerText = "LOADING...";
            errorText.style.display = "none";

            try {
                // Guaranteed relative path "fit to path"
                const response = await fetch(`/api/check-result?name=${encodeURIComponent(name)}&id=${encodeURIComponent(id)}`);
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('studentData', JSON.stringify(data));
                    window.location.href = 'results.html'; 
                } else {
                    errorText.innerText = data.error || "Student not found.";
                    errorText.style.display = "block";
                }
            } catch (err) {
                console.error("Fetch error:", err);
                errorText.innerText = "Network error. Unable to connect to the portal.";
                errorText.style.display = "block";
            } finally {
                btn.innerText = "SEARCH RESULT";
            }
        }

        // --- STAFF: Login Logic (AESTHETIC & STRUCTURAL ONLY - No backend connected) ---
        async function loginStaff() {
            const staffId = document.getElementById('staffId').value;
            const password = document.getElementById('staffPassword').value;
            const errorText = document.getElementById('staffError');
            const btn = document.getElementById('staffLoginBtn');

            if (!staffId || !password) {
                errorText.innerText = "Please fill in all fields.";
                errorText.style.display = "block";
                return;
            }

            btn.innerText = "AUTHENTICATING...";
            errorText.style.display = "none";

            try {
                // Placeholder fetch: structured perfectly but will fail as endpoint doesn't exist
                const response = await fetch(`/api/login-staff`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staffId, password })
                });

                // This logic is structured, but you haven't created the backend for this yet!
                const data = await response.json();
                
                if (response.ok) {
                    alert("Staff Login Successful!"); // In future, will redirect to dashboard
                } else {
                    errorText.innerText = data.error || "Staff login failed.";
                    errorText.style.display = "block";
                }

            } catch (err) {
                // Fallback since the backend route is missing
                console.error("Staff Login Error:", err);
                errorText.innerText = "Staff Login endpoint not yet active in server.js.";
                errorText.style.display = "block";
            } finally {
                btn.innerText = "LOGIN TO DASHBOARD";
            }
        }
    </script>
</body>
</html>
