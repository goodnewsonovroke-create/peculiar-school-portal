<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peculiar School Portal - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="login-container">
        <img src="school-logo.png.jpg" alt="Peculiar High School Logo">
        <h2>STUDENT RESULT PORTAL</h2>
        <p>Check your academic performance securely.</p>

        <!-- Form fields -->
        <input type="text" id="studentName" placeholder="ENTER FULL NAME" required>
        <input type="text" id="studentId" placeholder="ENTER ID (e.g., PS/2026/5191)" required>
        
        <button id="searchBtn" onclick="checkResult()">SEARCHING...</button>
        <p id="errorMessage" style="color: red; display: none;"></p>
    </div>

    <script>
        async function checkResult() {
            const name = document.getElementById('studentName').value;
            const id = document.getElementById('studentId').value;
            const errorText = document.getElementById('errorMessage');
            const btn = document.getElementById('searchBtn');

            // Basic validation
            if (!name || !id) {
                errorText.innerText = "Please fill in all fields.";
                errorText.style.display = "block";
                return;
            }

            btn.innerText = "LOADING...";
            errorText.style.display = "none";

            try {
                // ✅ CLEAN SHEET RULE: Relative path only. NO localhost!
                const response = await fetch(`/api/check-result?name=${encodeURIComponent(name)}&id=${encodeURIComponent(id)}`);
                const data = await response.json();

                if (response.ok) {
                    // Success! Redirect to results page and pass the data
                    localStorage.setItem('studentData', JSON.stringify(data));
                    window.location.href = 'results.html'; 
                } else {
                    // Server returned an error (like "Student not found")
                    errorText.innerText = data.error || "Login failed.";
                    errorText.style.display = "block";
                }
            } catch (err) {
        console.error("Fetch error:", err);
        const errorText = document.getElementById('errorMessage');
        errorText.innerText = "Network error. Unable to connect to the portal.";
        errorText.style.display = "block";
        
        // OR, if you are using an alert, just make it this:
        // alert("Network error: Could not reach the server.");
    
            } finally {
                btn.innerText = "SEARCHING...";
            }
        }
    </script>
</body>
</html>
