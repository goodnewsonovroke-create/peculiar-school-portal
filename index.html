<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Peculiar School</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Peculiar School Portal</h1>
    </header>

    <main id="login-section" class="main-login-container">
        <form id="loginForm">
            <h2>Sign In</h2>
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter Student's Full Name" required>
            
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" required>
            
            <button type="submit">Login</button>
            <p id="message"></p>
            <a href="register.html" style="display:block; text-align:center; margin-top:10px;">New Student? Register Here</a>
        </form>
    </main>

    <div id="dashboard" style="display: none; text-align: center; padding: 50px;">
    <h2>Welcome to the Portal</h2>
    <div class="portal-buttons">
        <button class="p-btn" onclick="window.location.href='results.html'">Check Results</button>
        <button class="p-btn" onclick="window.location.href='upload.html'">Upload Portal</button>
        <button class="p-btn" onclick="location.reload()" style="background-color: #d9534f;">Logout</button>
    </div>
</div>

    <footer>
        <p>&copy; 2025 Peculiar School - Okpanam, Delta State</p>
        <span class="motto">"Study to show yourself approved"</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
