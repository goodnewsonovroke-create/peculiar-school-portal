<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peculiar School Portal - Student Access</title>
    <!-- Your CSS is already working, this links to it! -->
    <link rel="stylesheet" href="styles.css">
</head>
<!-- This class triggers your background image from styles.css -->
<body class="portal-bg"> 

    <!-- This div triggers the beautiful translucent glass box! -->
    <div class="portal-container"> 
        
        <div style="text-align: center;">
            <!-- IMPORTANT: Make sure your file in VS Code is named EXACTLY 'school-logo.jpg' -->
            <img src="school-logo.jpg" alt="Peculiar High School Logo" style="width: 120px; margin-bottom: 10px;">
            <h2>STUDENT RESULT PORTAL</h2>
            <p>Check your academic performance securely.</p>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="studentName" placeholder="ENTER FULL NAME" required>
            <input type="text" id="studentId" placeholder="ENTER ID (e.g., PS/2026/5191)" required>
        </div>

        <button id="searchBtn" onclick="checkResult()">SEARCH RESULT</button>
        <p id="studentError" class="error-text" style="color: red; display: none; font-weight: bold; text-align: center;"></p>

        <div style="text-align: center; margin-top: 15px;">
            <!-- Link to Staff Login -->
            <a href="/login" style="color: #d4af37; text-decoration: none; font-weight: bold; font-size: 14px;">Staff Member? Access Portal</a>
        </div>

    </div>

</body>
</html>
    <script>
    async function checkResult() {
        const name = document.getElementById('student_name').value.trim();
        const id = document.getElementById('student_id').value.trim();
        const btn = document.querySelector('.btn'); // Targets your search button
        
        if(!name || !id) {
            return alert("Please enter both Name and ID.");
        }

        // Change button text to show it's working
        btn.innerText = "SEARCHING...";
        btn.style.opacity = "0.7";

        try {
            // REPAIRED: The missing fetch command is back!
            const response = await fetch(`/api/check-result?name=${encodeURIComponent(name)}&id=${encodeURIComponent(id)}`);
            
            // If the server says "404 Not Found" or is offline
            if (!response.ok) {
                alert("Student not found. Please check the Name and ID.");
                return; // Stop the script here if there's an error
            }
            
            const data = await response.json();
            
            // STRICT CHECK: Only redirect if we have real data from the database
            if (Array.isArray(data) && data.length > 0) {
                localStorage.setItem('studentResult', JSON.stringify(data));
                window.location.href = 'results.html'; // Safe to redirect now!
            } else {
                alert("No grades found for this student.");
            }
            
        } catch (err) {
            // REPAIRED: The missing catch block is fully restored!
            console.error("Fetch error:", err);
            alert("Network error: Unable to connect to the portal.");
        } finally {
            // Reset the button so you can try again
            btn.innerText = "SEARCH RESULT"; 
            btn.style.opacity = "1";
        }
    }
    </script>
</body>
</html>
